name: Ignition Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ignition:
    name: Test Ignition
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ignition

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic aiohttp requests

      - name: Run AST tests
        run: python test_ast.py
