name: Ignition Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ignition:
    name: Test Ignition
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: deployment/aisci-dashboard/ignition

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: deployment/aisci-dashboard/ignition/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run AST tests
        run: python test_ast.py
