name: Lint Check

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ '*' ]

permissions:
  contents: read

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment/aisci-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm install

      - name: Check frontend formatting
        run: npm run format

      - name: Run frontend linting
        run: npm run lint

      - name: Build frontend
        run: BETTER_AUTH_SECRET=local-dev-secret npm run build
