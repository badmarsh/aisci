name: Lint Check

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ '*' ]

permissions:
  contents: read

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: deployment/aisci-dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: deployment/aisci-dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Check frontend formatting
        run: npm run format

      - name: Run frontend linting
        run: npm run lint

      - name: Build frontend
        run: BETTER_AUTH_SECRET=local-dev-secret npm run build
