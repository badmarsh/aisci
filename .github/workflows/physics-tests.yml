name: Physics Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r physics/requirements.txt

      - name: Run physics tests
        run: cd physics && python -m pytest tests/ -v

      - name: Run root tests
        run: python -m pytest tests/ -v --tb=short
