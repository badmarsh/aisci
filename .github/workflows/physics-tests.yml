name: Physics Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy pandas scipy iminuit sympy requests

      - name: Run physics tests
        run: cd physics && python -m pytest tests/ -v

      - name: Smoke-test physics CLI
        run: |
          python physics/cli.py \
            --dry-run \
            --run-dir /tmp/smoke-test-cli \
            --data-path physics/data/fit_input_ins1735345.csv
