name: Smoke Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r physics/requirements.txt

      - name: Run root smoke tests
        run: python -m pytest tests/ -v -m smoke --tb=short
