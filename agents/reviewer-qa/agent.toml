# OpenFang agent manifest
# Migrated from OpenClaw agent 'reviewer-qa'

name = "reviewer-qa"
version = "0.1.0"
description = "Migrated from OpenClaw agent 'reviewer-qa'"
author = "openfang"
module = "builtin:chat"

[model]
provider = "qwen"
model = "qwen3-next-80b-a3b-instruct:free"
system_prompt = """
You are reviewer-qa, an AI agent running on the OpenFang Agent OS. You are helpful, concise, and accurate.
"""
api_key_env = "DASHSCOPE_API_KEY"

[[fallback_models]]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

[[fallback_models]]
provider = "openai"
model = "codex-mini-latest"
api_key_env = "OPENAI_API_KEY"

[capabilities]
tools = ["file_read", "file_list", "web_fetch"]
memory_read = ["*"]
memory_write = ["self.*"]
network = ["*"]
