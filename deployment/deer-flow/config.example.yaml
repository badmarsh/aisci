# Configuration for the DeerFlow application
#
# Guidelines:
# - Copy this file to `config.yaml` and customize it for your environment
# - The default path of this configuration file is `config.yaml` in the project root.
#   You can set `DEER_FLOW_PROJECT_ROOT` to define that root explicitly, or use
#   `DEER_FLOW_CONFIG_PATH` to point at a specific config file.
# - Runtime state defaults to `.deer-flow` under the project root. Override it
#   with `DEER_FLOW_HOME` when you need a different writable data directory.
# - Environment variables are available for all field values. Example: `api_key: $OPENAI_API_KEY`
# - The `use` path is a string that looks like "package_name.sub_package_name.module_name:class_name/variable_name".

# ============================================================================
# Config Version (used to detect outdated config files)
# ============================================================================
# Bump this number when the config schema changes.
# Run `make config-upgrade` to merge new fields into your local config.yaml.
config_version: 9

# ============================================================================
# Logging
# ============================================================================
log_level: info

# ============================================================================
# Token Usage
# ============================================================================
token_usage:
  enabled: true

# ============================================================================
# Agents
# ============================================================================
agents:
  - name: physics-validation-director
    type: lead
    capacity: 100
  - name: literature-scout
    type: specialist
    capacity: 80
  - name: formula-checker
    type: specialist
    capacity: 80
  - name: fit-analyst
    type: specialist
    capacity: 80
  - name: referee-writer
    type: specialist
    capacity: 80
  - name: figure-table-builder
    type: specialist
    capacity: 60
  - name: evidence-ledger
    type: operations
    capacity: 80
  - name: coder
    type: operations
    capacity: 100
  - name: data-analyst
    type: operations
    capacity: 100
  - name: knowledge-manager
    type: operations
    capacity: 100
  - name: research-coordinator
    type: assistant
    capacity: 100
  - name: fact-checker
    type: specialist
    capacity: 80
  - name: report-exporter
    type: operations
    capacity: 60
  - name: academic-scout
    type: specialist
    capacity: 80
  - name: vision-analyst
    type: specialist
    capacity: 60

# ============================================================================
# Agents API
# ============================================================================
agents_api:
  enabled: true

# ============================================================================
# LangGraph
# ============================================================================
langgraph:
  recursion_limit: 150
  thinking_enabled: true
  subagent_enabled: true
  planner:
    strategy: tree_of_thoughts
    tot_branches: 3
    tot_depth: 4
    tot_evaluation_model: null
  context_management:
    max_turns: 50
    summary_threshold: 5
  memory:
    type: persistent
    storage: ./memory
    max_entries: 10000

# ============================================================================
# Deep Thinking
# ============================================================================
# When enabled, the coordinator runs an extended chain-of-thought reasoning
# block before producing the research plan. Controlled per-session via the
# UI lightbulb toggle or the API field `deep_think: true`.
deep_think:
  enabled: true
  model_name: null
  budget_tokens: 8192

# ============================================================================
# Swarm / Parallel Sub-task Execution
# ============================================================================
# Decomposes complex research queries into parallel async subtasks executed
# by independent researcher instances, then merges results.
swarm:
  enabled: true
  max_parallel_tasks: 4
  timeout_seconds: 600
  merge_strategy: ranked

