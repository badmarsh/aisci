# Prometheus scrape configuration for DeerFlow
# Mount this file at /etc/prometheus/prometheus.yml in the Prometheus container
# (already wired in docker-compose.extras.yml)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: deerflow

scrape_configs:
  # DeerFlow backend API metrics
  - job_name: deerflow-api
    static_configs:
      - targets:
          - host.docker.internal:8000   # adjust to your DeerFlow API port
    metrics_path: /metrics
    scrape_interval: 15s

  # ARQ worker metrics (if running start_http_server in the worker)
  - job_name: deerflow-arq-worker
    static_configs:
      - targets:
          - arq-worker:9091
    metrics_path: /metrics
    scrape_interval: 30s

  # Redis exporter (optional — add redis-exporter to docker-compose.extras.yml)
  # - job_name: redis
  #   static_configs:
  #     - targets:
  #         - redis-exporter:9121

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
