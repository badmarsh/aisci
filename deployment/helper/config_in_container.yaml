tool_groups:
- name: web
- name: file:read
- name: file:write
- name: bash
- name: knowledge
- name: deployment
tools:
- name: dokploy_deploy
  use: deerflow.community.dokploy.tools:dokploy_deploy_tool
  group: deployment
- name: web_search
  use: deerflow.community.firecrawl.tools:firecrawl_search_tool
  group: web
  max_results: 5
- name: web_fetch
  use: deerflow.community.exa.tools:web_fetch_tool
  group: web
- name: image_search
  group: web
  use: deerflow.community.image_search.tools:image_search_tool
  max_results: 5
- name: ls
  group: file:read
  use: deerflow.sandbox.tools:ls_tool
- name: read_file
  group: file:read
  use: deerflow.sandbox.tools:read_file_tool
- name: glob
  group: file:read
  use: deerflow.sandbox.tools:glob_tool
  max_results: 200
- name: grep
  group: file:read
  use: deerflow.sandbox.tools:grep_tool
  max_results: 100
- name: onyx_search
  group: knowledge
  use: deerflow.community.onyx.tools:onyx_search_tool
  num_hits: 5
- name: write_file
  use: deerflow.sandbox.tools:write_file_tool
  group: file:write
- name: str_replace
  use: deerflow.sandbox.tools:str_replace_tool
  group: file:write
- name: bash
  use: deerflow.sandbox.tools:bash_tool
  group: bash
- name: shell
  use: deerflow.sandbox.tools:bash_tool
  group: bash
tool_search:
  enabled: true
loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50
uploads:
  max_files: 10
  max_file_size: 52428800
  max_total_size: 104857600
  auto_convert_documents: false
  pdf_converter: auto
sandbox:
  use: deerflow.community.aio_sandbox:AioSandboxProvider
  image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
  port: 39120
  replicas: 2
  container_prefix: deer-flow-aio-sandbox
  idle_timeout: 1800
  allow_host_bash: true
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000
  mounts:
  - host_path: /home/ubuntu/aisci
    container_path: /mnt/host/aisci
    read_only: false
  environment:
    PYTHONUNBUFFERED: '1'
subagents:
  timeout_seconds: 900
  max_turns: 120
  agents:
    general-purpose:
      model: gemini-3.1-flash-lite
      timeout_seconds: 1800
      max_turns: 160
    bash:
      model: gemini-3.1-flash-lite
      timeout_seconds: 300
      max_turns: 80
skills:
  container_path: /mnt/skills
skill_evolution:
  enabled: true
  moderation_model_name: gemini-3.1-flash-lite
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: gemini-3.1-flash-lite
summarization:
  enabled: true
  model_name: gemini-3.1-flash-lite
  trigger:
  - type: tokens
    value: 10240
  - type: messages
    value: 30
  keep:
    type: messages
    value: 8
  trim_tokens_to_summarize: 8192
  summary_prompt: null
  preserve_recent_skill_count: 3
  preserve_recent_skill_tokens: 12000
  preserve_recent_skill_tokens_per_skill: 3000
  skill_file_read_tool_names:
  - read_file
  - read
  - view
  - cat
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: gemini-3.1-flash-lite
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
database:
  backend: sqlite
  sqlite_dir: .deer-flow/data
run_events:
  backend: db
  max_trace_content: 10240
  track_token_usage: true
