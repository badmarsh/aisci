name: onyx

services:
  onyx-auth-proxy:
    container_name: onyx-auth-proxy
    image: onyx-python-webdeps:3.11
    build:
      context: .
      dockerfile: Dockerfile.python-webdeps
    command: python /app/auth_proxy.py
    working_dir: /app
    volumes:
      - ./auth_proxy.py:/app/auth_proxy.py:ro
    environment:
      - API_SERVER_URL=http://onyx-api:8080
    depends_on:
      - onyx-api
    restart: unless-stopped
    networks:
      - default

  onyx-api:
    container_name: onyx-api-server
    image: onyx-backend-custom:v4.0.0-beta.0
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - IMAGE_TAG=v4.0.0-beta.0
        - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    command: >
      /bin/sh -c "python /app/deployment/patch_mcp_tool.py &&
      if [ \"${ENABLE_CRAFT:-false}\" = \"true\" ] || [ \"${ENABLE_CRAFT:-false}\" = \"True\" ]; then
        /app/scripts/setup_craft_templates.sh;
      fi &&
      alembic upgrade head &&
      echo \"Starting Onyx Api Server\" &&
      uvicorn onyx.main:app --factory --host 0.0.0.0 --port 8080 --workers $${ONYX_API_WORKERS:-1}"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      onyx-db:
        condition: service_started
      onyx-opensearch:
        condition: service_started
        required: false
      onyx-redis:
        condition: service_started
      onyx-inference:
        condition: service_started
      onyx-minio:
        condition: service_started
        required: false
      onyx-ollama:
        condition: service_started
        required: false
      onyx-unstructured:
        condition: service_started
        required: false
    restart: unless-stopped
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-basic}
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - LOG_LEVEL=ERROR
      - C_FORCE_ROOT=true
      - POSTGRES_HOST=onyx-db
      - OPENSEARCH_HOST=onyx-opensearch
      - OPENSEARCH_USE_SSL=false
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX=${ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX:-true}
      - REDIS_HOST=onyx-redis
      - MODEL_SERVER_HOST=onyx-inference
      - INDEXING_MODEL_SERVER_HOST=onyx-indexing
      - CODE_INTERPRETER_BASE_URL=http://onyx-code-interpreter:8000
      - S3_ENDPOINT_URL=http://onyx-minio:9000
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - OUTPUTS_TEMPLATE_PATH=/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs
      - VENV_TEMPLATE_PATH=/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv
      - WEB_TEMPLATE_PATH=/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web
      - PERSISTENT_DOCUMENT_STORAGE_PATH=/app/file-system
      - UNSTRUCTURED_API_URL=http://onyx-unstructured:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    volumes:
      - api_server_logs:/var/log/onyx
      - file-system:/app/file-system
      - craft_venv_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv
      - craft_outputs_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs
      - /home/ubuntu/aisci:/workspace/aisci:ro
    networks:
      - default

  onyx-background:
    container_name: onyx-background
    image: onyx-backend-custom:v4.0.0-beta.0
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - IMAGE_TAG=v4.0.0-beta.0
        - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    command: >
      /bin/sh -c "python /app/deployment/patch_mcp_tool.py &&
      if [ -f /etc/ssl/certs/custom-ca.crt ]; then
        update-ca-certificates;
      fi &&
      rm -f /app/celerybeat-schedule* /tmp/celerybeat-schedule* &&
      python /workspace/aisci/deployment/helper/patch_onyx_monitoring.py &&
      /app/scripts/supervisord_entrypoint.sh"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      onyx-db:
        condition: service_started
      onyx-opensearch:
        condition: service_started
        required: false
      onyx-redis:
        condition: service_started
      onyx-inference:
        condition: service_started
      onyx-indexing:
        condition: service_started
      onyx-ollama:
        condition: service_started
        required: false
      onyx-unstructured:
        condition: service_started
        required: false
    restart: unless-stopped
    environment:
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - LOG_LEVEL=INFO
      - C_FORCE_ROOT=true
      - CELERY_WORKER_DOCPROCESSING_CONCURRENCY=2
      - CELERY_WORKER_DOCFETCHING_CONCURRENCY=2
      - POSTGRES_HOST=onyx-db
      - OPENSEARCH_HOST=onyx-opensearch
      - OPENSEARCH_USE_SSL=false
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX=${ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX:-true}
      - REDIS_HOST=onyx-redis
      - MODEL_SERVER_HOST=onyx-inference
      - INDEXING_MODEL_SERVER_HOST=onyx-indexing
      - S3_ENDPOINT_URL=http://onyx-minio:9000
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_BOT_INVOKE_CHAR=${DISCORD_BOT_INVOKE_CHAR:-!}
      - API_SERVER_PROTOCOL=http
      - API_SERVER_HOST=onyx-api
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - OUTPUTS_TEMPLATE_PATH=/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs
      - VENV_TEMPLATE_PATH=/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv
      - WEB_TEMPLATE_PATH=/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web
      - PERSISTENT_DOCUMENT_STORAGE_PATH=/app/file-system
      - UNSTRUCTURED_API_URL=http://onyx-unstructured:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - background_logs:/var/log/onyx
      - file-system:/app/file-system
      - craft_venv_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv
      - craft_outputs_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs
      - /home/ubuntu/aisci:/workspace/aisci:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    networks:
      - default

  onyx-web:
    container_name: onyx-web-server
    image: onyxdotapp/onyx-web-server:${IMAGE_TAG:-v4.0.0-beta.0}
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      - onyx-api
    restart: unless-stopped
    environment:
      - INTERNAL_URL=http://onyx-api:8080
    networks:
      - default

  onyx-inference:
    container_name: onyx-inference-model-server
    image: onyxdotapp/onyx-model-server:${IMAGE_TAG:-v4.0.0-beta.0}
    command: >
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        export PYTHONDONTWRITEBYTECODE=1;
        export PYTHONPATH=\"/workspace/aisci/deployment/helper$${PYTHONPATH:+:$${PYTHONPATH}}\";
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: unless-stopped
    volumes:
      - model_cache_huggingface:/app/.cache/huggingface/
      - inference_model_server_logs:/var/log/onyx
      - /home/ubuntu/aisci:/workspace/aisci:ro
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DOCUMENT_ENCODER_MODEL=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - EMBEDDING_DIM=1536
      - NORMALIZE_EMBEDDINGS=True
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    networks:
      - default

  onyx-indexing:
    container_name: onyx-indexing-model-server
    image: onyxdotapp/onyx-model-server:${IMAGE_TAG:-v4.0.0-beta.0}
    command: >
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        export PYTHONDONTWRITEBYTECODE=1;
        export PYTHONPATH=\"/workspace/aisci/deployment/helper$${PYTHONPATH:+:$${PYTHONPATH}}\";
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: unless-stopped
    environment:
      - INDEXING_ONLY=True
      - NVIDIA_VISIBLE_DEVICES=all
      - DOCUMENT_ENCODER_MODEL=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - EMBEDDING_DIM=1536
      - NORMALIZE_EMBEDDINGS=True
    runtime: nvidia
    volumes:
      - indexing_huggingface_model_cache:/app/.cache/huggingface/
      - indexing_model_server_logs:/var/log/onyx
      - /home/ubuntu/aisci:/workspace/aisci:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    networks:
      - default

  onyx-db:
    container_name: onyx-db
    image: postgres:15.2-alpine
    shm_size: 1g
    command: -c 'max_connections=250'
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - db_volume:/var/lib/postgresql/data
    networks:
      - default

  onyx-opensearch:
    container_name: onyx-opensearch
    image: opensearchproject/opensearch:3.6.0
    environment:
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=StrongPassword123!"
      - "discovery.type=single-node"
      - "bootstrap.memory_lock=true"
      - "OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    volumes:
      - onyx-opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - default

  onyx-nginx:
    container_name: onyx-nginx
    image: nginx:1.25.5-alpine
    restart: unless-stopped
    depends_on:
      onyx-api:
        condition: service_started
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      - DOMAIN=localhost
      - ONYX_BACKEND_API_HOST=onyx-api
      - ONYX_WEB_SERVER_HOST=onyx-web
      - ONYX_MCP_SERVER_HOST=onyx-mcp-server
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:3000:80"
    volumes:
      - ./nginx_configs:/nginx-templates:ro
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && cp -a /nginx-templates/. /etc/nginx/conf.d/
      && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh
      && /tmp/run-nginx.sh app.conf.template"
    networks:
      - default

  onyx-redis:
    container_name: onyx-redis
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    volumes:
      - redis_data:/data
    networks:
      - default

  onyx-minio:
    container_name: onyx-minio
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${S3_FILE_STORE_BUCKET_NAME:-onyx-file-store-bucket}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - default

  onyx-code-interpreter:
    container_name: onyx-code-interpreter
    image: onyxdotapp/code-interpreter:latest
    privileged: true
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    networks:
      - default

  onyx-ollama:
    container_name: onyx-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - onyx-ollama_volume:/root/.ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - default

  onyx-unstructured:
    container_name: onyx-unstructured
    image: quay.io/unstructured-io/unstructured-api:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - default

  onyx-litellm:
    container_name: onyx-litellm
    image: ghcr.io/berriai/litellm:latest
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - /home/ubuntu/aisci/deployment/onyx/onyx-litellm_config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4001", "--num_workers", "1" ]
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      - LITELLM_LOCAL_MODEL_COST_MAP=true
      - LITELLM_TRUNCATE_EMBEDDINGS=true
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_API_BASE=https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    restart: unless-stopped
    depends_on:
      - onyx-ollama
    networks:
      - default

  onyx-image-bridge:
    container_name: onyx-image-bridge
    image: onyx-python-webdeps:3.11
    build:
      context: .
      dockerfile: Dockerfile.python-webdeps
    command: uvicorn main:app --host 0.0.0.0 --port 8090
    working_dir: /app
    volumes:
      - ./image-bridge/main.py:/app/main.py:ro
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    networks:
      - default

  onyx-mcp-server:
    container_name: onyx-mcp-server
    build:
      context: ./onyx-mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      - ONYX_API_URL=http://onyx-api:8080
      - PORT=3001
      - MCP_MESSAGE_ENDPOINT=/onyx/messages
    command: >
      sh -c 'export ONYX_API_TOKEN="$${ONYX_API_TOKEN:-$${ONYX_API_KEY}}";
      npm run start:sse'
    depends_on:
      - onyx-api
    networks:
      - default

  onyx-mcp-proxy:
    container_name: onyx-mcp-proxy
    image: nginx:1.25.5-alpine
    ports:
      - "127.0.0.1:8095:80"
    volumes:
      - ./nginx_configs/mcp_proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    name: onyx_default

volumes:
  db_volume:
  minio_data:
  model_cache_huggingface:
  indexing_huggingface_model_cache:
  api_server_logs:
  background_logs:
  inference_model_server_logs:
  indexing_model_server_logs:
  file-system:
  onyx-opensearch-data:
  onyx-ollama_volume:
  craft_venv_volume:
  craft_outputs_volume:
  redis_data:
