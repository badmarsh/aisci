  relational_db:
    image: postgres:15.2-alpine
    shm_size: 1g
    command: -c 'max_connections=250'
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_volume:/var/lib/postgresql/data

  index:
    image: vespaengine/vespa:8.609.39
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - VESPA_SKIP_UPGRADE_CHECK=${VESPA_SKIP_UPGRADE_CHECK:-true}
    volumes:
      - vespa_volume:/opt/vespa/var

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g"
      - "cluster.routing.allocation.disk.threshold_enabled=true"
      - "cluster.routing.allocation.disk.watermark.low=90%"
      - "cluster.routing.allocation.disk.watermark.high=95%"
      - "cluster.routing.allocation.disk.watermark.flood_stage=97%"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  nginx:
    image: nginx:1.25.5-alpine
    restart: unless-stopped
    depends_on:
      - api_server
      - web_server
    env_file:
      - path: .env
        required: false
    environment:
      - DOMAIN=localhost
      - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
      - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
      - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    ports:
      - "127.0.0.1:${HOST_PORT_80:-80}:80"
      - "127.0.0.1:${HOST_PORT:-3000}:80"
    volumes:
      - ../data/nginx:/nginx-templates:ro
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && cp -a /nginx-templates/. /etc/nginx/conf.d/
      && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh
      && /tmp/run-nginx.sh app.conf.template"

  cache:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    env_file:
      - path: .env
        required: false
    tmpfs:
      - /data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    profiles: ["s3-filestore"]
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${S3_FILE_STORE_BUCKET_NAME:-onyx-file-store-bucket}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  code-interpreter:
    image: onyxdotapp/code-interpreter:${CODE_INTERPRETER_IMAGE_TAG:-latest}
    command: ["bash", "./entrypoint.sh", "code-interpreter-api"]
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    user: root
    volumes:
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Map workspace for code interpreter to access files
      - /home/ubuntu/aisci:/workspace/aisci:rw

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_volume:/root/.ollama
      # Map workspace for Ollama to access files
      - /home/ubuntu/aisci:/workspace/aisci:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  unstructured:
    # quay.io image is the actual HTTP API server (free, no key required for local use)
    # downloads.unstructured.io is the Python library image — it exits immediately
    image: ${UNSTRUCTURED_IMAGE:-quay.io/unstructured-io/unstructured-api:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UNSTRUCTURED_HOST_PORT:-9560}:8000"
    environment:
      # No cloud API key needed — running fully local
      - UNSTRUCTURED_API_KEY=${UNSTRUCTURED_API_KEY:-}
    healthcheck:
      # wget is available in the image; python3/curl are not
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--output-document=-",
          "http://localhost:8000/healthcheck",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4" ]
    environment:
      # Prevent external cost-map fetches that corrupt the aiohttp SSL session state
      - LITELLM_LOCAL_MODEL_COST_MAP=true
      # Cloud API key — Qwen Dashscope (contextual RAG + vision + embeddings)
      - QWEN_API_KEY=${QWEN_API_KEY}
      - DASHSCOPE_API_KEY=${QWEN_API_KEY}
      - DASHSCOPE_API_BASE=https://dashscope-intl.aliyuncs.com/api/v1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    restart: unless-stopped
    healthcheck:
      # Use /health/readiness — not /health — to avoid calling all configured providers.
      # /health would timeout on Ollama models that are not yet pulled (gemma2:27b etc.)
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      ollama:
        condition: service_healthy

  onyx_mcp_server:
    build:
      context: ./onyx-mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ONYX_API_TOKEN=${ONYX_API_KEY}
      - ONYX_API_URL=http://api_server:8080
      - PORT=3001
      - MCP_MESSAGE_ENDPOINT=/onyx/messages
    depends_on:
      - api_server
    networks:
      - default

  mcp_proxy:
    image: nginx:1.25.5-alpine
    ports:
      - "0.0.0.0:8095:80"
    volumes:
      - ./nginx_configs/mcp_proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  db_volume:
  vespa_volume:
  minio_data:
  model_cache_huggingface:
  indexing_huggingface_model_cache:
  api_server_logs:
  background_logs:
  inference_model_server_logs:
  indexing_model_server_logs:
  file-system:
  opensearch-data:
  ollama_volume:
  craft_venv_volume:
  craft_outputs_volume:
