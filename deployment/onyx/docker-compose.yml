# =============================================================================
# ONYX DOCKER COMPOSE - WITH VS CODE WORKSPACE MAPPING
# =============================================================================
# This is the default configuration for Onyx with added volume mappings for 
# tight integration with VS Code workspace in WSL.
# =============================================================================

name: onyx

services:
  auth_proxy:
    image: python:3.11-slim
    command: >
      /bin/sh -c "pip install fastapi httpx uvicorn &&
      python /app/auth_proxy.py"
    working_dir: /app
    volumes:
      - ./auth_proxy.py:/app/auth_proxy.py:ro
    environment:
      - API_SERVER_URL=http://api_server:8080
    depends_on:
      - api_server
    restart: unless-stopped
    networks:
      - default

  api_server:
    image: onyx-backend-custom:${IMAGE_TAG:-v3.3.0-beta.0}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - IMAGE_TAG=${IMAGE_TAG:-v3.3.0-beta.0}
        - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    command: >
      /bin/sh -c "python /app/deployment/patch_mcp_tool.py &&
      if [ \"${ENABLE_CRAFT:-false}\" = \"true\" ] || [ \"${ENABLE_CRAFT:-false}\" = \"True\" ]; then
        /app/scripts/setup_craft_templates.sh;
      fi &&
      alembic upgrade head &&
      echo \"Starting Onyx Api Server\" &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080 --workers 4"
    env_file:
      - path: .env
        required: false
    depends_on:
      relational_db:
        condition: service_started
      index:
        condition: service_started
      opensearch:
        condition: service_started
        required: false
      cache:
        condition: service_started
      inference_model_server:
        condition: service_started
      minio:
        condition: service_started
        required: false
      ollama:
        condition: service_started
        required: false
      unstructured:
        condition: service_healthy
        required: false
    restart: unless-stopped
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-basic}
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX=${ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX:-false}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
      - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - OUTPUTS_TEMPLATE_PATH=${OUTPUTS_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs}
      - VENV_TEMPLATE_PATH=${VENV_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv}
      - WEB_TEMPLATE_PATH=${WEB_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
      - UNSTRUCTURED_API_URL=${UNSTRUCTURED_API_URL:-http://unstructured:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 25s
    volumes:
      - api_server_logs:/var/log/onyx
      - file-system:/app/file-system
      - craft_venv_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv
      - craft_outputs_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs
      # VS Code workspace volume mapping
      - /home/ubuntu/aisci:/workspace/aisci:rw

  background:
    image: onyx-backend-custom:${IMAGE_TAG:-v3.3.0-beta.0}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - IMAGE_TAG=${IMAGE_TAG:-v3.3.0-beta.0}
        - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    command: >
      /bin/sh -c "python /app/deployment/patch_mcp_tool.py &&
      sed -i 's/_OPENAI_MAX_INPUT_LEN = 2048/_OPENAI_MAX_INPUT_LEN = 10/' /app/onyx/natural_language_processing/search_nlp_models.py &&
      if [ -f /etc/ssl/certs/custom-ca.crt ]; then
        update-ca-certificates;
      fi &&
      rm -f /app/celerybeat-schedule /app/celerybeat-schedule.db &&
      /app/scripts/supervisord_entrypoint.sh"
    env_file:
      - path: .env
        required: false
    depends_on:
      relational_db:
        condition: service_started
      index:
        condition: service_started
      opensearch:
        condition: service_started
        required: false
      cache:
        condition: service_started
      inference_model_server:
        condition: service_started
      indexing_model_server:
        condition: service_started
      ollama:
        condition: service_started
        required: false
      unstructured:
        condition: service_healthy
        required: false
    restart: unless-stopped
    environment:
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX=${ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX:-false}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
      - INDEXING_MODEL_SERVER_HOST=${INDEXING_MODEL_SERVER_HOST:-indexing_model_server}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_BOT_INVOKE_CHAR=${DISCORD_BOT_INVOKE_CHAR:-!}
      - API_SERVER_PROTOCOL=${API_SERVER_PROTOCOL:-http}
      - API_SERVER_HOST=${API_SERVER_HOST:-api_server}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - OUTPUTS_TEMPLATE_PATH=${OUTPUTS_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs}
      - VENV_TEMPLATE_PATH=${VENV_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv}
      - WEB_TEMPLATE_PATH=${WEB_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
      - UNSTRUCTURED_API_URL=${UNSTRUCTURED_API_URL:-http://unstructured:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - background_logs:/var/log/onyx
      - file-system:/app/file-system
      - craft_venv_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv
      - craft_outputs_volume:/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs
      # VS Code workspace volume mapping
      - /home/ubuntu/aisci:/workspace/aisci:rw
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  web_server:
    image: ${ONYX_WEB_SERVER_IMAGE:-onyxdotapp/onyx-web-server:v3.3.0-beta.0}
    env_file:
      - path: .env
        required: false
    depends_on:
      - api_server
    restart: unless-stopped
    environment:
      - INTERNAL_URL=${INTERNAL_URL:-http://api_server:8080}

  inference_model_server:
    image: ${ONYX_MODEL_SERVER_IMAGE:-onyxdotapp/onyx-model-server:v3.3.0-beta.0}
    command: >
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    volumes:
      - model_cache_huggingface:/app/.cache/huggingface/
      - inference_model_server_logs:/var/log/onyx
      # Optional: Map workspace for model-related files
      - /home/ubuntu/aisci:/workspace/aisci:rw
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DOCUMENT_ENCODER_MODEL=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - EMBEDDING_DIM=1536
      - NORMALIZE_EMBEDDINGS=True
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 3

  indexing_model_server:
    image: ${ONYX_MODEL_SERVER_IMAGE:-onyxdotapp/onyx-model-server:v3.3.0-beta.0}
    command: >
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    environment:
      - INDEXING_ONLY=True
      - NVIDIA_VISIBLE_DEVICES=all
      - DOCUMENT_ENCODER_MODEL=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - EMBEDDING_DIM=1536
      - NORMALIZE_EMBEDDINGS=True
    runtime: nvidia
    volumes:
      - indexing_huggingface_model_cache:/app/.cache/huggingface/
      - indexing_model_server_logs:/var/log/onyx
      # Optional: Map workspace for indexing-related files
      - /home/ubuntu/aisci:/workspace/aisci:rw
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 3

