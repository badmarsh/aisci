model_list:
  # ── Local Ollama models (openai-compat endpoint, avoids aiohttp SSL bug) ──
  - litellm_params:
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/gemma2:27b
    model_name: gemma2

  - model_name: qwen2.5
    litellm_params:
      model: openai/qwen2.5-72b-instruct
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY

  - litellm_params:
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/qwen2.5vl:7b
    model_name: qwen2.5vl

  - litellm_params:
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/nomic-embed-text:latest
      model_type: embedding
    model_name: local-embedding-optical

  - litellm_params:
      api_base: http://nemotron_embed_vl:8000/v1
      api_key: nim-local
      model: openai/nvidia/llama-nemotron-embed-vl-1b-v2
      model_type: embedding
    model_name: nemotron-embed-vl

    # ── Contextual RAG: qwen-cloud-fast ──────────────────────────────────────
    # Two standard Qwen cloud chat entries share the same alias → LiteLLM load-balances
    # with latency-based routing and auto-retries on failure.
    # Keep realtime-capable variants on a separate alias so normal chat/completions
    # traffic does not get routed through a model intended for realtime workflows.
    #
    # Weight priority: qwen-omni-turbo > qwen3.5-omni-plus
    # Offline emergency: local gemma2:27b (weight 1)

  # qwen-turbo: confirmed working, no free-tier exhaustion
  - litellm_params:
      api_key: os.environ/NVIDIA_API_KEY
      model: openai/meta/llama-3.3-70b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      drop_params: true
      weight: 20
    model_name: qwen-cloud-fast

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-turbo
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      drop_params: true
      weight: 10
    model_name: qwen-cloud-fast

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-turbo
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      drop_params: true
    model_name: qwen3-omni-flash-2025-09-15

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-coder-plus-2025-09-23
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      drop_params: true
    model_name: qwen3-coder-plus-2025-09-23

  # ── Native Dashscope variants (stable fallbacks) ──
  - model_name: dashscope-qwen-plus
    litellm_params:
      model: openai/qwen-plus-latest
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY

  - litellm_params:
      # Offline emergency fallback — no cloud dependency
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/gemma2:27b
      weight: 1
    model_name: qwen-cloud-fast

    # ── Cloud reranker ────────────────────────────────────────────────────────
    # qwen3-rerank: 1M quota. Can be used as alternative to local bge-reranker.
    # Not yet wired into Onyx (Onyx calls its own model server for reranking).
    # Kept here for future use via direct LiteLLM rerank endpoint.
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: dashscope/qwen3-rerank
    model_name: qwen-rerank

    # ── Visual RAG (image understanding) ─────────────────────────────────────
    # All image models: 100-req trial quota each — for user queries only.
  - litellm_params:
      api_key: os.environ/NVIDIA_API_KEY
      model: openai/meta/llama-3.2-90b-vision-instruct
      api_base: https://integrate.api.nvidia.com/v1
      drop_params: true
      weight: 20
    model_name: qwen-vision

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-vl-235b-a22b
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      drop_params: true
      weight: 10
    model_name: qwen-vision

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-vl-max-latest
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      drop_params: true
    model_name: qwen-vision

    # ── Image Generation (Fixes broken generate_image tool on Assistant) ───────
    # These are Text-to-Image models (not image understanding).
    # Onyx will route 'generate_image' requests here.
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: dashscope/qwen-image-max-2025-12-30
    model_name: qwen-image-gen

    # ── Embeddings ────────────────────────────────────────────────────────────
    # Vision-aware embeddings: 1M quota each
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: dashscope/tongyi-embedding-vision-flash
      model_type: embedding
    model_name: qwen-embed-vision-fast

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: dashscope/tongyi-embedding-vision-plus
      model_type: embedding
    model_name: qwen-embed-vision

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/text-embedding-v4
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      model_type: embedding
      encoding_format: float
      drop_params: true
    model_name: qwen-embed-text

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/text-embedding-v4
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      model_type: embedding
      encoding_format: float
      drop_params: true
    model_name: text-embedding-v4

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 600 # raised from 300 — local 27B/32B Ollama models on CPU need significantly more time
  retry_after: 20 # raised from 10 — gives backend more time to recover
  fallbacks:
    - qwen3-omni-flash-2025-09-15:
        - qwen3-coder-plus-2025-09-23
        - dashscope-qwen-plus
        - qwen2.5
    - qwen3-coder-plus-2025-09-23:
        - dashscope-qwen-plus
        - qwen2.5
