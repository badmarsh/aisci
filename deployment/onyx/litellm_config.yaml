model_list:
  # ── Local Ollama models ───────────────────────────────────────────────────
  - litellm_params:
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/gemma2:27b
    model_name: gemma2

  - litellm_params:
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/qwen2.5vl:7b
    model_name: qwen2.5vl

  - litellm_params:
      api_base: http://ollama:11434/v1
      api_key: ollama
      model: openai/nomic-embed-text:latest
      model_type: embedding
    model_name: local-embedding-optical

  # ── Qwen Cloud: High Speed & Flash ────────────────────────────────────────
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3.5-flash
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen3.5-flash

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-flash
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-flash

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3.6-flash-2026-04-16
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      extra_body:
        enable_thinking: true
    model_name: qwen3.6-flash-2026-04-16

  # ── Qwen Cloud: Plus (Consolidated Alias) ──────────────────────────────────
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-plus-latest
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-plus

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-plus-2025-12-01
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-plus

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-plus-2025-09-11
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-plus

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-plus-2025-07-28
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-plus

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-plus-2025-07-14
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-plus

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-plus-2025-04-28
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-plus

  # ── Qwen Cloud: Reasoning & Thinking (Large) ──────────────────────────────
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3.6-35b-a3b
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      extra_body:
        enable_thinking: true
    model_name: qwen3.6-35b-a3b

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3.6-27b
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      extra_body:
        enable_thinking: true
    model_name: qwen3.6-27b

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-235b-a22b
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      extra_body:
        enable_thinking: true
    model_name: qwen3-235b-a22b

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3.5-397b-a17b
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      extra_body:
        enable_thinking: true
    model_name: qwen3.5-397b-a17b

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-next-80b-a3b-thinking
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      extra_body:
        enable_thinking: true
    model_name: qwen3-next-80b-a3b-thinking

  # ── Qwen Cloud: Coding & Flagship ─────────────────────────────────────────
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-max
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-max

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-next-80b-a3b-instruct
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-next-80b-a3b-instruct

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-coder-30b-a3b-instruct
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-coder-30b-a3b-instruct

  # ── NVIDIA Cloud ──────────────────────────────────────────────────────────
  - litellm_params:
      api_key: os.environ/NVIDIA_API_KEY
      model: openai/meta/llama-3.1-405b-instruct
      api_base: https://integrate.api.nvidia.com/v1
    model_name: nim-giant

  - litellm_params:
      api_key: os.environ/NVIDIA_API_KEY
      model: openai/meta/llama-3.3-70b-instruct
      api_base: https://integrate.api.nvidia.com/v1
    model_name: llama-3.3-70b

  # ── Vision & Multi-modal ──────────────────────────────────────────────────
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen-vl-max-latest
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen-vl-max

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: openai/qwen3-vl-235b-a22b-instruct
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-vl-235b

  # ── Embeddings ────────────────────────────────────────────────────────────
  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: dashscope/text-embedding-v3
      api_base: https://dashscope-intl.aliyuncs.com/api/v1
      model_type: embedding
    model_name: text-embedding-v3

  - litellm_params:
      api_key: os.environ/QWEN_API_KEY
      model: dashscope/text-embedding-v4
      api_base: https://dashscope-intl.aliyuncs.com/api/v1
      model_type: embedding
    model_name: text-embedding-v4

  # ── OpenRouter: Free & Flagship ──────────────────────────────────────────
  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/google/gemma-4-26b-a4b-it:free
    model_name: gemma-4-26b-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/google/gemma-4-31b-it:free
    model_name: gemma-4-31b-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
    model_name: llama-3.3-70b-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/minimax/minimax-m2.5:free
    model_name: minimax-m2.5-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
    model_name: hermes-3-405b-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
    model_name: nemotron-3-super-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/openai/gpt-5.4
    model_name: gpt-5.4

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/openai/gpt-5.4-image-2
    model_name: gpt-5.4-vision

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/openai/gpt-oss-120b:free
    model_name: gpt-oss-120b-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/openrouter/free
    model_name: openrouter-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/qwen/qwen3-coder:free
    model_name: qwen3-coder-free

  - litellm_params:
      api_key: os.environ/OPENROUTER_API_KEY
      model: openrouter/z-ai/glm-4.5-air:free
    model_name: glm-4.5-air-free

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 600
  retry_after: 20
  enable_pre_call_checks: true
