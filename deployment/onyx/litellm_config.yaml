model_list:
- litellm_params:
    api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key: os.environ/DASHSCOPE_API_KEY
    model: qwen3.5-omni-flash
    timeout: 120
  model_name: qwen-cloud-fast

- litellm_params:
    api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key: os.environ/DASHSCOPE_API_KEY
    model: qwen3.5-omni-flash
    timeout: 120
  model_name: qwen-rag-fast

- litellm_params:
    api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key: os.environ/DASHSCOPE_API_KEY
    model: qwen3.5-omni-plus
    timeout: 180
  model_name: qwen-rag-balanced

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: gemma2:27b
  model_name: gemma2

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: qwen2.5vl:7b
    timeout: 600
  model_name: qwen-rag-local

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: mistral-small:22b
    timeout: 600
  model_name: qwen-rag-quality

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: qwen2.5vl:7b
    timeout: 600
  model_name: qwen-rag-vision

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: qwen2.5vl:7b
  model_name: qwen2.5vl

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: qwen2.5-omni:7b
  model_name: qwen2.5-omni-7b

- litellm_params:
    api_base: http://ollama:11434/v1
    api_key: none
    model: nomic-embed-text:latest
    model_type: embedding
  model_name: local-embedding-optical

router_settings:
  allowed_fails: 10
  cooldown_time: 0
  enable_pre_call_checks: true
  routing_strategy: latency-based-routing
  timeout: 1200
  context_window_fallbacks:
    - qwen-rag-fast: [qwen-rag-balanced, gemma2]
    - qwen-rag-balanced: [gemma2]
    - qwen-cloud-fast: [qwen-rag-local, gemma2]
  content_policy_fallbacks:
    - qwen-cloud-fast: [qwen-rag-local]
