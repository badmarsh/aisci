# Standalone reference copy for the MCP proxy.
# Current compose does not mount this file.
# The live template for the running `mcp_proxy` service is
# `deployment/onyx/nginx_configs/mcp_proxy.conf.template`.

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mcp_cache:10m max_size=1g inactive=15m use_temp_path=off;

server {
    listen 80;

    # Common cache settings
    proxy_cache mcp_cache;
    proxy_cache_methods GET POST;
    proxy_cache_key "$request_method$request_uri$request_body";
    proxy_cache_valid 200 15m;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    proxy_buffers 16 32k;
    proxy_buffer_size 64k;

    # Forward headers
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Upstream TLS hardening (AIS-66)
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384;
    proxy_ssl_session_reuse on;

    # Route for Scite - using the original endpoint
    location /scite/ {
        proxy_pass https://api.scite.ai/mcp/;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_ssl_server_name on;
        proxy_ssl_name api.scite.ai;
    }

    # Route for Consensus
    location /consensus/ {
        proxy_pass https://mcp.consensus.app/mcp/;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Local Onyx MCP server (SSE transport) reference route.
    location /onyx/ {
        proxy_pass http://onyx_mcp_server:3001/;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    # Compatibility route for older Onyx MCP server images that advertise
    # /messages from the SSE endpoint.
    location /messages {
        proxy_pass http://onyx_mcp_server:3001/messages;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
