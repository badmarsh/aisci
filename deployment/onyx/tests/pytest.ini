[pytest]
# Pytest configuration for Onyx tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = deployment/onyx/tests

# Markers
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (moderate speed)
    e2e: End-to-end tests (slow)
    smoke: Smoke tests (basic health checks)
    regression: Regression tests (prevent known bugs)
    slow: Tests that take > 10s
    requires_onyx: Requires Onyx service running
    requires_opensearch: Requires OpenSearch running
    requires_network: Requires network access

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage
[coverage:run]
source = deployment/onyx
omit =
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
