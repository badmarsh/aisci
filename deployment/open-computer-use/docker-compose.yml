version: '3.8'

services:
  backend:
    image: llmhub-backend
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      # Override specific settings for Docker environment
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8001
      - ENVIRONMENT=production
      - DEBUG=false
      - CORS_ORIGINS=http://localhost:3000,http://nextjs-app:3000
      - CACHE_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - llmhub-network

  nextjs-app:
    image: llmhub-frontend
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time arguments still needed for Next.js build process
        - ENCRYPTION_KEY=${ENCRYPTION_KEY}
        - CSRF_SECRET=${CSRF_SECRET}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - SUPABASE_SERVICE_ROLE=${SUPABASE_SERVICE_ROLE}
        - STRIPE_API_KEY=${STRIPE_API_KEY:-}
        - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
        - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER:-}
        - STRIPE_PRICE_PROFESSIONAL=${STRIPE_PRICE_PROFESSIONAL:-}
        - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE:-}
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      # Override specific settings for Docker environment
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PYTHON_BACKEND_URL=http://backend:8001
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - llmhub-network
    depends_on:
      - backend

networks:
  llmhub-network:
    driver: bridge