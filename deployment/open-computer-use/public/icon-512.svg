<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#171717"/>
    </linearGradient>
    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0"/>
      <stop offset="25%" style="stop-color:rgba(255,255,255,0.06);stop-opacity:1"/>
      <stop offset="45%" style="stop-color:rgba(255,255,255,0.18);stop-opacity:1"/>
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1"/>
      <stop offset="80%" style="stop-color:rgba(255,255,255,0.75);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,1);stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.04)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>
  <!-- Subtle border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="106.5" ry="106.5" fill="none" stroke="url(#rimGrad)" stroke-width="3"/>
  <!-- Horizon circle logo centered -->
  <circle cx="256" cy="256" r="160" fill="url(#horizonGrad)"/>
</svg>
