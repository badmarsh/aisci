[pytest]
# Post-deployment smoke/regression suite.
# Pytest is invoked with this ini when run from this directory; the repo-level
# pyproject/pytest config is ignored so we don't inherit the unit-test
# conftest stubs (which mock AWS/Supabase).

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default flags:
#   --strict-markers  → unknown markers fail the run (keeps catalog honest)
#   -ra               → summarize all failures/skips at end
#   --tb=short        → compact tracebacks (full ones are noise in CI)
#   --durations=10    → show the 10 slowest tests so we can prune
#   --color=yes       → CI log colour
addopts = --strict-markers -ra --tb=short --durations=10 --color=yes
asyncio_mode = strict

# Register every marker we use anywhere in the suite — spelling mistakes
# would otherwise silently skip tests.
markers =
    infra: AWS plane-of-record checks (ECS/ALB/TG/SG/ACM). Read-only.
    frontend: Public website / Next.js routes via Cloudflare.
    backend: Direct FastAPI hits via public ALB :8001.
    routing: Path-based ALB rule + split-service routing correctness.
    internal: Internal ALB and Next.js → Python backend path.
    electron: Electron desktop-app HTTP + WebSocket flows.
    publicapi: Developer-facing public API (/api/public/* or /api/v1/*).
    database: Supabase / RLS round-trips as a real user.
    e2e: End-to-end chat flows with real SSE streaming (billable).
    security: CSRF / CSP / rate-limit / auth-gate checks.
    observability: CloudWatch log / metric presence.
    slow: Takes >5s; skipped when SKIP_SLOW=1.
    destructive: Writes to Supabase or creates billing events (always skippable).
    dos: Resource-exhaustion / rate-limit-bypass / DoS-resilience checks (must not crash backend).
    race: Concurrency / TOCTOU / race-condition tests (must not corrupt state).
