# Repo-local MCP client reference for physics-validation workflows.
# This file is not auto-loaded by `deployment/onyx/docker-compose.yml`.
# The live shared proxy/auth layer is documented in `docs/ops/deployment-reference.md`
# and implemented by `deployment/onyx/nginx_configs/mcp_proxy.conf.template`.
# Keep this file secret-free and treat it as documentation until a specific client is
# wired to consume it.

consensus:
  enabled: true
  base_url: "https://mcp.consensus.app/mcp/"
  # Consensus uses OAuth Bearer tokens — NOT a static API key.
  # auth_type: oauth means the calling agent supplies:
  #   Authorization: Bearer ${CONSENSUS_MCP_BEARER_TOKEN}
  # The token is obtained by completing the Consensus OAuth flow at https://consensus.app
  # and is stored in .env as CONSENSUS_MCP_BEARER_TOKEN (see env.template).
  # nginx passes it through unchanged via proxy_pass_header Authorization.
  # Do NOT add a static Authorization header in nginx for this service.
  auth_type: "oauth"
  token_env_var: "CONSENSUS_MCP_BEARER_TOKEN"
  timeout: 30
  max_retries: 3

scite:
  enabled: true
  base_url: "https://api.scite.ai/mcp/"
  # Scite uses a static API key injected as a Bearer token.
  # Store it in .env as SCITE_API_KEY (see env.template).
  auth_type: "bearer"
  token_env_var: "SCITE_API_KEY"
  timeout: 30
  max_retries: 3

# Physics-specific MCP configuration
physics_validation:
  formula_extraction:
    enabled: true
    patterns:
      - "\\frac{dN}{dp_T dy}"
      - "v = \\frac{U}{\\sqrt{1 + U^2}}"
      - "T_{\\text{Tsallis}}"
      - "q_{\\text{non-extensive}}"
    search_terms:
      - "Tsallis distribution ATLAS"
      - "Blast-Wave model 13 TeV"
      - "power-law tails pT spectra"
  citation_context:
    enabled: true
    context_window: 5
    max_citations: 10
  dimensional_analysis:
    enabled: true
    validation_rules:
      - "velocity must be < 1 (c)"
      - "pT must be in GeV/c"
      - "temperature must be in GeV"

# MCP routing configuration
routing:
  consensus:
    path: "/consensus/"
  scite:
    path: "/scite/"
