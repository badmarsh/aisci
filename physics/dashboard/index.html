<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Pipeline Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚛️ Physics Pipeline Dashboard</h1>
            <p class="subtitle">HEP Particle Spectra Analysis</p>
        </header>

        <div class="grid">
            <!-- Status Overview -->
            <section class="card status-card">
                <h2>📊 Status Overview</h2>
                <div id="status-content">
                    <div class="loading">Loading...</div>
                </div>
            </section>

            <!-- Recent Runs -->
            <section class="card runs-card">
                <h2>🔬 Recent Runs</h2>
                <div id="runs-content">
                    <div class="loading">Loading...</div>
                </div>
            </section>

            <!-- Agenda -->
            <section class="card agenda-card">
                <h2>📋 Next Actions</h2>
                <div id="agenda-content">
                    <div class="loading">Loading...</div>
                </div>
            </section>

            <!-- Evidence Ledger -->
            <section class="card evidence-card">
                <h2>📚 Evidence Ledger</h2>
                <div id="evidence-content">
                    <div class="loading">Loading...</div>
                </div>
            </section>

            <!-- Available Models -->
            <section class="card models-card">
                <h2>🧮 Available Models</h2>
                <div id="models-content">
                    <div class="loading">Loading...</div>
                </div>
            </section>
        </div>

        <footer>
            <p>Last updated: <span id="last-updated">-</span></p>
            <button onclick="refreshAll()" class="refresh-btn">🔄 Refresh</button>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
