name: ingest_hep_documents
description: "Ingest latest High Energy Physics (HEP) papers and research data into Onyx knowledge base."
version: "1.0"

schedule: "0 2 * * *" # Run daily at 2 AM

steps:
  - name: fetch_arxiv_papers
    use: deerflow.community.arxiv:fetch_papers
    with:
      query: "cat:hep-ph AND (Tsallis OR Blast-Wave)"
      max_results: 10
      sort_by: "submittedDate"

  - name: process_documents
    use: connectors.onyx_connector:OnyxConnector
    action: ingest_document
    foreach: "{{ steps.fetch_arxiv_papers.output }}"
    with:
      title: "{{ item.title }}"
      content: "{{ item.summary }}"
      source_link: "{{ item.link }}"

  - name: update_ledger
    use: deerflow.sandbox:bash
    with:
      command: |
        echo "Ingested {{ steps.process_documents.count }} papers into Onyx." >> research/robert/evidence-ledger.md
