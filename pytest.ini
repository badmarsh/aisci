[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    performance: Performance benchmarks
    security: Security tests
    smoke: Quick smoke tests
    physics: Physics pipeline tests
    onyx: Onyx RAG tests
    deerflow: DeerFlow orchestration tests
    skills: Agent skills tests
    slow: Slow running tests

# Default options
addopts =
    --verbose
    --strict-markers
    --tb=short

# Timeout
timeout = 300

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
