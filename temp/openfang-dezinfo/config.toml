# OpenFang dezinfo project -- ADDITIVE config patch
#
# This file is NOT copied over your existing ~/.openfang/config.toml.
# Instead, setup.sh merges only the dezinfo-specific keys.
# Your existing config (api_listen, cors_origin, default_model, memory,
# network) is preserved untouched.
#
# Keys added/merged by setup.sh:
#   [knowledge_graph]   -- new section, safe to add
#   [output]            -- new section, safe to add
#   [monitoring]        -- new section, safe to add
#   [skills]            -- new section, safe to add

[knowledge_graph]
enabled = true
backend = "sqlite"
path    = "~/.openfang/knowledge-graph.db"

[output]
dir = "/tmp/openfang"

[monitoring]
prometheus_port  = 9100
healthcheck_path = "/health"

[skills]
search_engine = "brave"
brave_api_key = "${BRAVE_API_KEY}"
